name: Deploy to EC2
on:
  push:
    branches: [ main ]      
  workflow_dispatch:         

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH로 EC2 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e                              
            cd /var/www/cdtest
            git pull origin main                
            sudo nginx -t                       
            sudo systemctl reload nginx 
            curl -s -m 5 -X POST ${{ secrets.MY_WEB_HOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d "{\"type\":\"message\",\"attachments\":[{\"contentType\":\"application/vnd.microsoft.card.adaptive\",\"content\":{\"type\":\"AdaptiveCard\",\"\$schema\":\"http://adaptivecards.io/schemas/adaptive-card.json\",\"version\":\"1.2\",\"body\":[{\"type\":\"TextBlock\",\"text\":\"Git Push Detected!\",\"wrap\":true}]}}]}" \
            >/dev/null 2>&1
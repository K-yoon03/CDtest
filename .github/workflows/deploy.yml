name: Deploy to EC2
on:
  push:
    branches: [ main ]      
  workflow_dispatch:         

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH로 EC2 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e                              
            cd /var/www
            git pull origin main                
            sudo nginx -t                       
            sudo systemctl reload nginx 